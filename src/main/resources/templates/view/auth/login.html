<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout/layout}">

<head>
    <title layout:fragment="title">로그인</title>
</head>

<body>
    <div layout:fragment="content" class="login-wrapper">
        <div id="app" class="login-container">
            <div class="login-box">
                <h2>{{ title }}</h2>

                <form @submit.prevent="handleLogin">
                    <div class="input-group">
                        <label for="username">아이디</label>
                        <input type="text" id="username" v-model="loginForm.username" placeholder="아이디를 입력하세요" required>
                    </div>

                    <div class="input-group">
                        <label for="password">비밀번호</label>
                        <input type="password" id="password" v-model="loginForm.password" placeholder="비밀번호를 입력하세요"
                            required>
                    </div>

                    <p v-if="errorMessage" class="error-message">{{ errorMessage }}</p>

                    <button type="submit" class="login-button" :disabled="isLoading">
                        {{ isLoading ? '로그인 중...' : '로그인' }}
                    </button>
                </form>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script th:src="@{/js/login.js}"></script>
    </th:block>
</body>

</html>

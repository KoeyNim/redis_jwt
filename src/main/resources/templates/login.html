<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Vue 3</title>
    <!-- Vue 3 CDN (실 서비스에서는 vue.global.prod.js 사용 권장) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- CSS 파일 연결 -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div id="app" class="login-container">
        <div class="login-box">
            <h2>{{ title }}</h2>

            <form @submit.prevent="handleLogin">
                <div class="input-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" v-model="loginForm.username" placeholder="아이디를 입력하세요" required>
                </div>

                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" v-model="loginForm.password" placeholder="비밀번호를 입력하세요"
                        required>
                </div>

                <!-- 에러 메시지 표시 -->
                <p v-if="errorMessage" class="error-message">{{ errorMessage }}</p>

                <button type="submit" class="login-button" :disabled="isLoading">
                    {{ isLoading ? '로그인 중...' : '로그인' }}
                </button>
            </form>
        </div>
    </div>

    <!-- JS 파일 연결 -->
    <script th:src="@{/js/login.js}"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인 화면 - Vue 3</title>
    <!-- Vue 3 CDN (실 서비스에서는 vue.global.prod.js 사용 권장) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- CSS 파일 연결 -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>
    <!-- v-cloak은 Vue 인스턴스가 준비될 때까지 화면 깜빡임을 방지합니다 -->
    <div id="app" v-cloak>
        <header class="header">
            <h1>환영합니다!</h1>
            <button @click="handleLogout" class="logout-button">로그아웃</button>
        </header>

        <main class="main-content">
            <div class="user-info-card">
                <h2>{{ userInfo.username || '사용자' }}님의 대시보드</h2>
                <p><strong>발급받은 JWT 토큰 (localStorage):</strong></p>
                <div class="token-box">
                    {{ token ? token : '토큰이 없습니다.' }}
                </div>

                <div class="actions">
                    <button @click="fetchUserData" class="action-button">내 정보(보호된 API) 요청하기</button>
                </div>

                <!-- 에러 메시지 표시 -->
                <p v-if="errorMessage" class="error-message">{{ errorMessage }}</p>
            </div>
        </main>
    </div>

    <!-- JS 파일 연결 -->
    <script th:src="@{/js/main.js}"></script>
</body>

</html>
